substitutions:
  name: open-task-light
  friendly_name: Open Task Light
  fallback_ap_password: "open-task-light"
  # If mDNS doesn't work in your network, set this to the device IP (e.g. "192.168.1.50").
  use_address: "${name}.local"

  # `esp32_touch` binary_sensor thresholds are kept high because touch actions
  # are handled by a custom polling state machine below.
  touch_threshold_power: "50000"
  touch_threshold_brightness_up: "50000"
  touch_threshold_brightness_dn: "50000"
  touch_threshold_temp_up: "50000"
  touch_threshold_temp_dn: "50000"

  # Touch engine tuning.
  touch_engine_scan_interval: 10ms
  touch_engine_debug_interval_ms: "250"
  touch_engine_on_debounce_ticks: "2"
  touch_engine_off_debounce_ticks: "2"
  touch_engine_winner_margin: "30"
  touch_engine_hold_power_ms: "3000"
  # If power remains active too long after a tap, allow an early release when
  # the signal has decayed close to the on-threshold.
  touch_engine_power_forced_release_ms: "700"
  touch_engine_power_release_margin: "900"
  touch_engine_tap_max_ms: "700"
  touch_engine_double_tap_window_ms: "450"
  touch_engine_baseline_shift: "5"      # baseline alpha = 1/32
  touch_engine_noise_shift: "4"         # noise alpha = 1/16
  touch_engine_min_signal_power: "160"
  touch_engine_min_signal_brightness_up: "90"
  touch_engine_min_signal_brightness_dn: "90"
  touch_engine_min_signal_temp_up: "90"
  touch_engine_min_signal_temp_dn: "110"
  touch_engine_min_release_signal: "28"
  touch_engine_noise_mult_power: "8"
  touch_engine_noise_mult_buttons: "6"
  touch_engine_max_signal_power: "2400"
  touch_engine_max_signal_buttons: "900"

  # Calibration/reseed timing.
  touch_cal_settle_delay: 1200ms

  # Touch hold timing (tuning).
  # - Smaller repeat delay = faster changes while holding a pad.
  # - Keep this >= ~10ms to avoid excessive state spam / CPU load.
  touch_hold_initial_delay_ms: "60"
  touch_hold_repeat_delay_ms: "16"
  touch_hold_brightness_step: "0.0075f"    # 0.75% per repeat
  touch_hold_ct_step_mired: "4.0f"         # mireds per repeat
  touch_tap_brightness_step: "0.015f"      # 1.5% per tap
  touch_tap_ct_step_mired: "4.0f"          # mireds per tap

  # Pin map (mirrors main/otl_main.c)
  pin_pwm_warm: GPIO35
  pin_pwm_cool: GPIO36
  pin_ws2812: GPIO40
  pin_touch_power: GPIO7
  pin_touch_brightness_up: GPIO8
  pin_touch_brightness_dn: GPIO9
  pin_touch_temp_up: GPIO10
  pin_touch_temp_dn: GPIO11
  pin_radar_tx: GPIO43
  pin_radar_rx: GPIO44
  pin_radar_out: GPIO15

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    # Run after components have initialized so `esp32_touch` has valid readings.
    priority: -10
    then:
      - script.execute: calibrate_touch_thresholds 

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    # ESP-IDF v5+ deprecates the legacy touch API that ESPHome currently uses.
    # This suppresses the build warning without changing behavior.
    sdkconfig_options:
      CONFIG_TOUCH_SUPPRESS_DEPRECATE_WARN: "y"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Reduce command latency (ESP32 Wi-Fi modem sleep can add seconds of lag).
  power_save_mode: none
  # Optional: set a static IP (recommended if you set `use_address` to an IP).
  # manual_ip:
  #   static_ip: 192.168.1.50
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0
  #   dns1: 192.168.1.1
  # Address used by ESPHome for API/OTA uploads. Use a static IP here if mDNS
  # resolution fails (the default "${name}.local" requires mDNS).
  use_address: "${use_address}"
  ap:
    ssid: "${friendly_name} Fallback"
    # If you prefer to store this in Home Assistant secrets.yaml, replace with:
    #   password: !secret wifi_fallback_password
    password: "${fallback_ap_password}"

captive_portal:

api:

ota:
  - platform: esphome

# Local device web UI at `http://open-task-light.local` (or the configured IP).
web_server:
  port: 80

# Set `baud_rate: 0` to disable serial logs (mirrors CONFIG_OTL_SERIAL_OUTPUT off).
logger:
  baud_rate: 115200
  # Set to DEBUG temporarily when tuning touch thresholds.
  level: INFO

# Touch engine + diagnostics (toggle logs with the `touch_debug` switch).
interval:
  - interval: ${touch_engine_scan_interval}
    then:
      - lambda: |-
          constexpr uint8_t PAD_COUNT = 5;
          constexpr uint8_t PAD_NONE = 0xFF;
          constexpr uint8_t PAD_POWER = 0;
          constexpr uint8_t PAD_BU = 1;
          constexpr uint8_t PAD_BD = 2;
          constexpr uint8_t PAD_TU = 3;
          constexpr uint8_t PAD_TD = 4;

          static bool seeded = false;
          static int32_t baseline_q8[PAD_COUNT] = {0, 0, 0, 0, 0};
          static int32_t noise_q8[PAD_COUNT] = {0, 0, 0, 0, 0};
          static uint8_t active_pad = PAD_NONE;
          static uint8_t candidate_pad = PAD_NONE;
          static uint8_t candidate_ticks = 0;
          static uint8_t release_ticks = 0;
          static uint32_t press_started_ms = 0;
          static uint32_t next_repeat_ms = 0;
          static bool active_repeated = false;
          static bool power_hold_done = false;
          static uint32_t last_debug_ms = 0;
          static uint32_t last_tap_ms[PAD_COUNT] = {0, 0, 0, 0, 0};

          const uint32_t now = millis();

          auto clear_runtime = [&]() {
            active_pad = PAD_NONE;
            candidate_pad = PAD_NONE;
            candidate_ticks = 0;
            release_ticks = 0;
            active_repeated = false;
            power_hold_done = false;
            id(power_arm_neopixel) = false;
          };

          if (!id(touch_controls).state) {
            clear_runtime();
            return;
          }

          if (id(touch_calibrating)) {
            clear_runtime();
            return;
          }

          auto read_delta = [](touch_pad_t pad, uint32_t *out_delta) -> bool {
            uint32_t bench = 0;
            uint32_t value = 0;
            if (touch_pad_read_benchmark(pad, &bench) != ESP_OK || bench == 0) {
              return false;
            }
            if (touch_pad_filter_read_smooth(pad, &value) != ESP_OK || value == 0) {
              if (touch_pad_read_raw_data(pad, &value) != ESP_OK || value == 0) {
                return false;
              }
            }
            *out_delta = (value > bench) ? (value - bench) : 0u;
            return true;
          };

          const touch_pad_t pads[PAD_COUNT] = {
            id(touch_power).get_touch_pad(),
            id(touch_brightness_up).get_touch_pad(),
            id(touch_brightness_dn).get_touch_pad(),
            id(touch_temp_up).get_touch_pad(),
            id(touch_temp_dn).get_touch_pad(),
          };

          uint32_t delta[PAD_COUNT] = {0, 0, 0, 0, 0};
          bool ok[PAD_COUNT] = {false, false, false, false, false};
          for (uint8_t i = 0; i < PAD_COUNT; i++) {
            ok[i] = read_delta(pads[i], &delta[i]);
          }

          if (id(touch_reseed_requested)) {
            id(touch_reseed_requested) = false;
            seeded = false;
          }

          if (!seeded) {
            bool have_all = true;
            for (uint8_t i = 0; i < PAD_COUNT; i++) {
              if (!ok[i]) {
                have_all = false;
                break;
              }
            }
            if (!have_all) {
              return;
            }
            for (uint8_t i = 0; i < PAD_COUNT; i++) {
              baseline_q8[i] = ((int32_t) delta[i]) << 8;
              noise_q8[i] = 20 << 8;
              last_tap_ms[i] = 0;
            }
            clear_runtime();
            seeded = true;
            ESP_LOGI("touch_cal", "Touch baseline seeded.");
            return;
          }

          const uint16_t min_signal_on[PAD_COUNT] = {
            ${touch_engine_min_signal_power},
            ${touch_engine_min_signal_brightness_up},
            ${touch_engine_min_signal_brightness_dn},
            ${touch_engine_min_signal_temp_up},
            ${touch_engine_min_signal_temp_dn},
          };
          const uint8_t noise_mult[PAD_COUNT] = {
            ${touch_engine_noise_mult_power},
            ${touch_engine_noise_mult_buttons},
            ${touch_engine_noise_mult_buttons},
            ${touch_engine_noise_mult_buttons},
            ${touch_engine_noise_mult_buttons},
          };
          const uint16_t max_signal_on[PAD_COUNT] = {
            ${touch_engine_max_signal_power},
            ${touch_engine_max_signal_buttons},
            ${touch_engine_max_signal_buttons},
            ${touch_engine_max_signal_buttons},
            ${touch_engine_max_signal_buttons},
          };

          uint16_t baseline[PAD_COUNT] = {0, 0, 0, 0, 0};
          uint16_t noise[PAD_COUNT] = {0, 0, 0, 0, 0};
          uint16_t signal[PAD_COUNT] = {0, 0, 0, 0, 0};
          uint16_t on_thr[PAD_COUNT] = {0, 0, 0, 0, 0};
          uint16_t off_thr[PAD_COUNT] = {0, 0, 0, 0, 0};

          for (uint8_t i = 0; i < PAD_COUNT; i++) {
            if (ok[i] && active_pad != i && candidate_pad != i) {
              const int32_t delta_q8 = ((int32_t) delta[i]) << 8;
              baseline_q8[i] += (delta_q8 - baseline_q8[i]) >> ${touch_engine_baseline_shift};

              int32_t dev = (int32_t) delta[i] - (baseline_q8[i] >> 8);
              if (dev < 0) dev = -dev;
              const int32_t dev_q8 = dev << 8;
              noise_q8[i] += (dev_q8 - noise_q8[i]) >> ${touch_engine_noise_shift};
            }

            int32_t base_i = baseline_q8[i] >> 8;
            if (base_i < 0) base_i = 0;
            if (base_i > 65535) base_i = 65535;
            baseline[i] = (uint16_t) base_i;

            int32_t noise_i = noise_q8[i] >> 8;
            if (noise_i < 0) noise_i = 0;
            if (noise_i > 65535) noise_i = 65535;
            noise[i] = (uint16_t) noise_i;

            uint32_t sig = 0;
            if (ok[i] && delta[i] > (uint32_t) baseline[i]) {
              sig = delta[i] - (uint32_t) baseline[i];
            }
            if (sig > 65535u) sig = 65535u;
            signal[i] = (uint16_t) sig;

            uint32_t dyn_thr = (uint32_t) noise[i] * (uint32_t) noise_mult[i];
            if (dyn_thr < min_signal_on[i]) dyn_thr = min_signal_on[i];
            if (dyn_thr > max_signal_on[i]) dyn_thr = max_signal_on[i];
            on_thr[i] = (uint16_t) dyn_thr;

            uint32_t rel_thr = dyn_thr / 2u;
            if (rel_thr < ${touch_engine_min_release_signal}) {
              rel_thr = ${touch_engine_min_release_signal};
            }
            off_thr[i] = (uint16_t) rel_thr;
          }

          auto clamp_ct_mired = [](float ct_mired) -> float {
            const float ct_warm_mired = 1000000.0f / 2700.0f;
            const float ct_cool_mired = 1000000.0f / 5000.0f;
            if (ct_mired < ct_cool_mired) ct_mired = ct_cool_mired;
            if (ct_mired > ct_warm_mired) ct_mired = ct_warm_mired;
            return ct_mired;
          };

          auto power_press = [&]() {
            if (id(task_light).current_values.is_on()) {
              const float b = id(task_light).current_values.get_brightness();
              if (b > 0.0f) {
                id(saved_brightness) = b;
              }

              float ct_mired = id(task_light).current_values.get_color_temperature();
              ct_mired = clamp_ct_mired(ct_mired);
              id(saved_ct_mired) = ct_mired;
              id(ui_color_temperature).publish_state(1000000.0f / ct_mired);

              id(power_arm_neopixel) = false;
              id(neopixel_enabled) = false;
              auto call = id(task_light).turn_off();
              call.set_transition_length(120);
              call.perform();
              return;
            }

            id(power_arm_neopixel) = true;
            float b = id(saved_brightness);
            if (b < 0.05f) b = 0.05f;
            if (b > 1.0f) b = 1.0f;

            float ct_mired = clamp_ct_mired(id(saved_ct_mired));

            auto call = id(task_light).turn_on();
            call.set_transition_length(120);
            call.set_brightness(b);
            call.set_color_temperature(ct_mired);
            call.perform();
          };

          auto power_release = [&]() {
            id(power_arm_neopixel) = false;
          };

          auto power_hold = [&]() {
            if (id(power_arm_neopixel) && id(task_light).current_values.is_on()) {
              id(neopixel_enabled) = true;
            }
            id(sync_status_pixel).execute();
          };

          auto step_brightness = [&](float step) {
            if (!id(task_light).current_values.is_on()) {
              auto on = id(task_light).turn_on();
              on.set_brightness(0.05f);
              on.perform();
            }

            float b = id(task_light).current_values.get_brightness();
            b += step;
            if (b > 0.95f) b = 0.95f;
            if (b < 0.05f) b = 0.05f;

            auto call = id(task_light).turn_on();
            call.set_transition_length(10);
            call.set_brightness(b);
            call.perform();
          };

          auto step_ct = [&](float step_mired) {
            if (!id(task_light).current_values.is_on()) {
              return;
            }

            float ct_mired = id(task_light).current_values.get_color_temperature();
            ct_mired += step_mired;
            ct_mired = clamp_ct_mired(ct_mired);

            auto call = id(task_light).turn_on();
            call.set_transition_length(10);
            call.set_color_temperature(ct_mired);
            call.perform();
          };

          auto apply_double_tap = [&](uint8_t pad) {
            if (pad == PAD_BU) {
              auto call = id(task_light).turn_on();
              call.set_brightness(0.95f);
              call.perform();
              return;
            }
            if (pad == PAD_BD) {
              auto call = id(task_light).turn_on();
              call.set_brightness(0.05f);
              call.perform();
              return;
            }
            if (pad == PAD_TU) {
              if (!id(task_light).current_values.is_on()) {
                return;
              }
              auto call = id(task_light).turn_on();
              call.set_color_temperature(1000000.0f / 5000.0f);
              call.perform();
              return;
            }
            if (pad == PAD_TD) {
              if (!id(task_light).current_values.is_on()) {
                return;
              }
              auto call = id(task_light).turn_on();
              call.set_color_temperature(1000000.0f / 2700.0f);
              call.perform();
            }
          };

          uint8_t best_pad = PAD_NONE;
          int32_t best_excess = 0;
          int32_t second_excess = 0;
          for (uint8_t i = 0; i < PAD_COUNT; i++) {
            if (!ok[i]) {
              continue;
            }
            const int32_t excess = (int32_t) signal[i] - (int32_t) on_thr[i];
            if (excess <= 0) {
              continue;
            }
            if (excess > best_excess) {
              second_excess = best_excess;
              best_excess = excess;
              best_pad = i;
            } else if (excess > second_excess) {
              second_excess = excess;
            }
          }

          if (best_pad != PAD_NONE && second_excess > 0 &&
              best_excess < (second_excess + (int32_t) ${touch_engine_winner_margin})) {
            best_pad = PAD_NONE;
          }

          if (active_pad == PAD_NONE) {
            if (best_pad == PAD_NONE) {
              candidate_pad = PAD_NONE;
              candidate_ticks = 0;
            } else if (candidate_pad == best_pad) {
              if (candidate_ticks < 255u) {
                candidate_ticks += 1;
              }
            } else {
              candidate_pad = best_pad;
              candidate_ticks = 1;
            }

            if (candidate_pad != PAD_NONE && candidate_ticks >= ${touch_engine_on_debounce_ticks}) {
              active_pad = candidate_pad;
              candidate_pad = PAD_NONE;
              candidate_ticks = 0;
              release_ticks = 0;
              press_started_ms = now;
              next_repeat_ms = now + ${touch_hold_initial_delay_ms};
              active_repeated = false;
              power_hold_done = false;

              if (active_pad == PAD_POWER) {
                power_press();
              } else if (active_pad == PAD_BU) {
                step_brightness(${touch_tap_brightness_step});
              } else if (active_pad == PAD_BD) {
                step_brightness(-${touch_tap_brightness_step});
              } else if (active_pad == PAD_TU) {
                step_ct(-${touch_tap_ct_step_mired});
              } else if (active_pad == PAD_TD) {
                step_ct(${touch_tap_ct_step_mired});
              }

              if (id(touch_debug).state) {
                ESP_LOGI("touch", "press pad=%u signal=%u on=%u",
                         (unsigned) active_pad, (unsigned) signal[active_pad], (unsigned) on_thr[active_pad]);
              }
            }
          } else {
            const bool active_ok = ok[active_pad];
            bool force_release = false;
            if (active_pad == PAD_POWER && !power_hold_done &&
                (now - press_started_ms) >= ${touch_engine_power_forced_release_ms}) {
              const uint32_t fast_release_thr =
                  (uint32_t) on_thr[PAD_POWER] + (uint32_t) ${touch_engine_power_release_margin};
              if ((uint32_t) signal[PAD_POWER] < fast_release_thr) {
                force_release = true;
              }
            }

            if (!active_ok || signal[active_pad] < off_thr[active_pad] || force_release) {
              if (release_ticks < 255u) {
                release_ticks += 1;
              }
            } else {
              release_ticks = 0;
            }

            if (active_pad == PAD_POWER) {
              if (!power_hold_done && (now - press_started_ms) >= ${touch_engine_hold_power_ms}) {
                power_hold();
                power_hold_done = true;
              }
            } else {
              while ((int32_t) (now - next_repeat_ms) >= 0) {
                if (active_pad == PAD_BU) {
                  step_brightness(${touch_hold_brightness_step});
                } else if (active_pad == PAD_BD) {
                  step_brightness(-${touch_hold_brightness_step});
                } else if (active_pad == PAD_TU) {
                  step_ct(-${touch_hold_ct_step_mired});
                } else if (active_pad == PAD_TD) {
                  step_ct(${touch_hold_ct_step_mired});
                }
                next_repeat_ms += ${touch_hold_repeat_delay_ms};
                active_repeated = true;
              }
            }

            if (release_ticks >= ${touch_engine_off_debounce_ticks}) {
              const uint8_t released_pad = active_pad;
              const uint32_t held_ms = now - press_started_ms;
              const bool was_repeat = active_repeated;

              active_pad = PAD_NONE;
              release_ticks = 0;
              active_repeated = false;
              power_hold_done = false;

              if (released_pad == PAD_POWER) {
                power_release();
              } else if (!was_repeat && held_ms <= ${touch_engine_tap_max_ms}) {
                if (last_tap_ms[released_pad] != 0u &&
                    (now - last_tap_ms[released_pad]) <= ${touch_engine_double_tap_window_ms}) {
                  last_tap_ms[released_pad] = 0u;
                  apply_double_tap(released_pad);
                } else {
                  last_tap_ms[released_pad] = now;
                }
              } else {
                last_tap_ms[released_pad] = 0u;
              }

              if (id(touch_debug).state) {
                ESP_LOGI("touch", "release pad=%u held=%u repeat=%d",
                         (unsigned) released_pad, (unsigned) held_ms, was_repeat ? 1 : 0);
              }
            }
          }

          if (id(touch_debug).state &&
              (last_debug_ms == 0u || (now - last_debug_ms) >= ${touch_engine_debug_interval_ms})) {
            last_debug_ms = now;
            ESP_LOGI("touch", "delta sig/on/off p=%u %u/%u/%u bu=%u %u/%u/%u bd=%u %u/%u/%u tu=%u %u/%u/%u td=%u %u/%u/%u active=%d cand=%d",
                     (unsigned) delta[PAD_POWER], (unsigned) signal[PAD_POWER], (unsigned) on_thr[PAD_POWER], (unsigned) off_thr[PAD_POWER],
                     (unsigned) delta[PAD_BU], (unsigned) signal[PAD_BU], (unsigned) on_thr[PAD_BU], (unsigned) off_thr[PAD_BU],
                     (unsigned) delta[PAD_BD], (unsigned) signal[PAD_BD], (unsigned) on_thr[PAD_BD], (unsigned) off_thr[PAD_BD],
                     (unsigned) delta[PAD_TU], (unsigned) signal[PAD_TU], (unsigned) on_thr[PAD_TU], (unsigned) off_thr[PAD_TU],
                     (unsigned) delta[PAD_TD], (unsigned) signal[PAD_TD], (unsigned) on_thr[PAD_TD], (unsigned) off_thr[PAD_TD],
                     active_pad == PAD_NONE ? -1 : (int) active_pad,
                     candidate_pad == PAD_NONE ? -1 : (int) candidate_pad);
          }

globals:
  - id: neopixel_enabled
    type: bool
    restore_value: yes
    initial_value: "false"
  - id: power_arm_neopixel
    type: bool
    restore_value: no
    initial_value: "false"
  # Restored when turning ON via the power pad (so OFF->ON returns to the
  # previous brightness/CCT instead of jumping to the minimum).
  - id: saved_brightness
    type: float
    restore_value: yes
    initial_value: "0.05f"
  - id: saved_ct_mired
    type: float
    restore_value: yes
    initial_value: "1000000.0f / 2700.0f"
  - id: touch_calibrating
    type: bool
    restore_value: no
    initial_value: "false"
  - id: touch_reseed_requested
    type: bool
    restore_value: no
    initial_value: "false"

switch:
  # Quick kill-switch for debugging noisy touch pads.
  - platform: template
    id: touch_controls
    name: "${friendly_name} Touch Controls"
    entity_category: config
    # If touch seems "dead", confirm this switch is ON in Home Assistant.
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
  - platform: template
    id: touch_debug
    name: "${friendly_name} Touch Debug"
    entity_category: diagnostic
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true

button:
  - platform: template
    name: "${friendly_name} Calibrate Touch"
    entity_category: config
    on_press:
      - script.execute: calibrate_touch_thresholds

number:
  # Color temperature slider for the built-in ESPHome web_server page.
  - platform: template
    id: ui_color_temperature
    name: "${friendly_name} Color Temperature"
    min_value: 2700
    max_value: 5000
    step: 50
    mode: slider
    optimistic: true
    set_action:
      - lambda: |-
          // Slider is in Kelvin; ESPHome light uses mireds.
          float k = x;
          if (k < 2700.0f) k = 2700.0f;
          if (k > 5000.0f) k = 5000.0f;
          const float ct_mired = 1000000.0f / k;
          id(saved_ct_mired) = ct_mired;
          if (id(task_light).current_values.is_on()) {
            auto call = id(task_light).turn_on();
            call.set_transition_length(10);
            call.set_color_temperature(ct_mired);
            call.perform();
          }

output:
  # Warm/cool PWM outputs. Frequency chosen to avoid audible whine (~19.5kHz).
  # `max_power: 0.95` caps brightness to ~95% duty to limit heat.
  #
  # Note: this uses standard overlapping PWM mixing (both channels can be on).
  # The ESP-IDF project's non-overlap mode uses LEDC `hpoint`; reproducing that
  # in ESPHome would require a custom component.
  - platform: ledc
    id: pwm_warm
    pin: ${pin_pwm_warm}
    frequency: 19531Hz
    channel: 0
    max_power: 0.95

  - platform: ledc
    id: pwm_cool
    pin: ${pin_pwm_cool}
    frequency: 19531Hz
    channel: 1
    max_power: 0.95

light:
  - platform: cwww
    id: task_light
    name: "${friendly_name}"
    warm_white: pwm_warm
    cold_white: pwm_cool
    # CCT endpoints for BXRV-TR-2750G-20A0-A-23 (2700K..5000K); adjust if your LEDs differ.
    warm_white_color_temperature: 2700 K
    cold_white_color_temperature: 5000 K
    constant_brightness: true
    gamma_correct: 1.6
    default_transition_length: 10ms
    restore_mode: RESTORE_DEFAULT_OFF
    on_state:
      - script.execute: sync_status_pixel
      - lambda: |-
          // Keep "restore" values in sync (so OFF->ON returns to the previous
          // brightness/CCT).
          if (!id(task_light).current_values.is_on()) {
            return;
          }

          const float b = id(task_light).current_values.get_brightness();
          id(saved_brightness) = b;

          float ct_mired = id(task_light).current_values.get_color_temperature();
          const float ct_warm_mired = 1000000.0f / 2700.0f;
          const float ct_cool_mired = 1000000.0f / 5000.0f;
          if (ct_mired < ct_cool_mired) ct_mired = ct_cool_mired;
          if (ct_mired > ct_warm_mired) ct_mired = ct_warm_mired;
          // Only publish when CT changes (brightness-only updates are frequent).
          float delta = ct_mired - id(saved_ct_mired);
          if (delta < 0.0f) delta = -delta;
          if (delta > 0.05f) {
            id(saved_ct_mired) = ct_mired;
            // Reflect current CT on the web_server slider (in Kelvin).
            id(ui_color_temperature).publish_state(1000000.0f / ct_mired);
          }

  # NeoPixel status indicator (OFF by default; enabled via long-hold on power).
  - platform: esp32_rmt_led_strip
    id: status_pixel
    name: "${friendly_name} Status Pixel"
    internal: true
    pin: ${pin_ws2812}
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    restore_mode: ALWAYS_OFF

script:
  - id: sync_status_pixel
    mode: restart
    then:
      - lambda: |-
          auto off = id(status_pixel).turn_off();

          if (!id(neopixel_enabled) || !id(task_light).current_values.is_on()) {
            off.perform();
            return;
          }

          // Match the firmware's warm<->cool indicator:
          // warm -> red, cool -> blue, scaled by brightness.
          const float ct_warm_mired = 1000000.0f / 2700.0f;
          const float ct_cool_mired = 1000000.0f / 5000.0f;

          float ct_mired = id(task_light).current_values.get_color_temperature();
          if (ct_mired < ct_cool_mired) ct_mired = ct_cool_mired;
          if (ct_mired > ct_warm_mired) ct_mired = ct_warm_mired;

          float ratio_cool = (ct_warm_mired - ct_mired) / (ct_warm_mired - ct_cool_mired); // 0 warm .. 1 cool
          float b = id(task_light).current_values.get_brightness(); // 0..1

          float r = (1.0f - ratio_cool) * b;
          float bl = ratio_cool * b;

          auto on = id(status_pixel).turn_on();
          on.set_rgb(r, 0.0f, bl);
          on.perform();

  - id: calibrate_touch_thresholds
    mode: restart
    then:
      - lambda: |-
          id(touch_calibrating) = true;
          id(touch_reseed_requested) = true;
          ESP_LOGI("touch_cal", "Touch baseline reset starting (do not touch pads)...");
      - delay: ${touch_cal_settle_delay}
      - lambda: |-
          id(touch_reseed_requested) = true;
          id(touch_calibrating) = false;
          ESP_LOGI("touch_cal", "Touch baseline reset finished.");

esp32_touch:
  # Set `setup_mode: true` temporarily to print raw baseline values for tuning.
  setup_mode: false
  # ESP32-S3 touch needs different timing than the original ESP32 defaults.
  # If touch doesn't work at all, start here.
  measurement_duration: 0.25ms
  sleep_duration: 0.25ms
  # Filter config (ESP32-S2/S3 only). Helps reduce noisy/phantom touches.
  # If you set any of these, you must set all of them.
  # If touches feel delayed, lower filter/debounce (at the cost of more noise).
  # This profile favors stability to suppress phantom spikes/crosstalk.
  filter_mode: IIR_16
  debounce_count: 2
  noise_threshold: 1
  jitter_step: 4
  smooth_mode: IIR_4
  # Denoise (requires both):
  denoise_grade: BIT8
  denoise_cap_level: L4

binary_sensor:
  # Pad definitions are kept internal; touch behavior is handled by the
  # custom polling state machine in `interval`.
  - platform: esp32_touch
    id: touch_power
    pin: ${pin_touch_power}
    threshold: ${touch_threshold_power}
    internal: true

  - platform: esp32_touch
    id: touch_brightness_up
    pin: ${pin_touch_brightness_up}
    threshold: ${touch_threshold_brightness_up}
    internal: true

  - platform: esp32_touch
    id: touch_brightness_dn
    pin: ${pin_touch_brightness_dn}
    threshold: ${touch_threshold_brightness_dn}
    internal: true

  - platform: esp32_touch
    id: touch_temp_up
    pin: ${pin_touch_temp_up}
    threshold: ${touch_threshold_temp_up}
    internal: true

  - platform: esp32_touch
    id: touch_temp_dn
    pin: ${pin_touch_temp_dn}
    threshold: ${touch_threshold_temp_dn}
    internal: true

# ---------------------------------------------------------------------------
# LD2410B presence sensor (UART)
  - platform: ld2410
    ld2410_id: radar
    has_target:
      name: "${friendly_name} Presence"
      id: radar_presence
      filters:
        - settle: 100ms
        - delayed_off: 30s

uart:
  - id: uart_radar
    tx_pin: ${pin_radar_tx}
    rx_pin: ${pin_radar_rx}
    baud_rate: 256000
    rx_buffer_size: 1024

ld2410:
  id: radar
  uart_id: uart_radar
