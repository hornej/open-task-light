esp32_touch:
  # Set `setup_mode: true` temporarily to print raw baseline values for tuning.
  setup_mode: false
  # ESP32-S3 touch needs different timing than the original ESP32 defaults.
  # If touch doesn't work at all, start here.
  measurement_duration: 0.25ms
  sleep_duration: 0.25ms
  # Filter config (ESP32-S2/S3 only). Helps reduce noisy/phantom touches.
  # If you set any of these, you must set all of them.
  # If touches feel delayed, lower filter/debounce (at the cost of more noise).
  # These match the ESP-IDF firmware defaults in `main/otl_main.c`.
  filter_mode: IIR_16
  debounce_count: 2
  noise_threshold: 1
  jitter_step: 4
  smooth_mode: IIR_4
  # Denoise (requires both):
  denoise_grade: BIT8
  denoise_cap_level: L4

binary_sensor:
  - platform: esp32_touch
    id: touch_power
    pin: ${pin_touch_power}
    threshold: ${touch_threshold_power}
    internal: true
    filters:
      - delayed_on: ${touch_filter_on_delay_power}
      - delayed_off: ${touch_filter_off_delay_power}
    on_press:
      - lambda: |-
          if (id(touch_debug).state) {
            ESP_LOGI("touch", "touch_power press value=%u threshold=%u controls=%d calibrating=%d",
                     (unsigned) id(touch_power).get_value(),
                     (unsigned) id(touch_power).get_threshold(),
                     id(touch_controls).state ? 1 : 0,
                     id(touch_calibrating) ? 1 : 0);
          }
          if (!id(touch_controls).state) {
            return;
          }
          if (id(touch_calibrating)) {
            return;
          }

          // Cross-talk guard: only act when this pad is the "strongest" touch.
          // This helps when a real touch causes brief threshold crossings on
          // neighboring pads.
          auto read_delta = [](touch_pad_t pad, uint32_t *out_delta) -> bool {
            uint32_t bench = 0;
            uint32_t value = 0;
            if (touch_pad_read_benchmark(pad, &bench) != ESP_OK || bench == 0) {
              return false;
            }
            if (touch_pad_filter_read_smooth(pad, &value) != ESP_OK || value == 0) {
              if (touch_pad_read_raw_data(pad, &value) != ESP_OK || value == 0) {
                return false;
              }
            }
            *out_delta = (value > bench) ? (value - bench) : 0u;
            return true;
          };

          uint32_t d_power = 0, d_bu = 0, d_bd = 0, d_tu = 0, d_td = 0;
          const bool ok_power = read_delta(id(touch_power).get_touch_pad(), &d_power);
          if (!ok_power) {
            return;
          }
          (void) read_delta(id(touch_brightness_up).get_touch_pad(), &d_bu);
          (void) read_delta(id(touch_brightness_dn).get_touch_pad(), &d_bd);
          (void) read_delta(id(touch_temp_up).get_touch_pad(), &d_tu);
          (void) read_delta(id(touch_temp_dn).get_touch_pad(), &d_td);

          const int32_t s_power = (int32_t) d_power - (int32_t) id(touch_power).get_threshold();
          const int32_t s_bu = (int32_t) d_bu - (int32_t) id(touch_brightness_up).get_threshold();
          const int32_t s_bd = (int32_t) d_bd - (int32_t) id(touch_brightness_dn).get_threshold();
          const int32_t s_tu = (int32_t) d_tu - (int32_t) id(touch_temp_up).get_threshold();
          const int32_t s_td = (int32_t) d_td - (int32_t) id(touch_temp_dn).get_threshold();

          // Pick the pad that is furthest above its own threshold.
          int best_idx = -1;
          int32_t best_s = 0;
          auto consider = [&](int idx, int32_t s) {
            if (s <= 0) return;
            if (best_idx < 0 || s > best_s) {
              best_idx = idx;
              best_s = s;
            }
          };
          consider(0, s_power);
          consider(1, s_bu);
          consider(2, s_bd);
          consider(3, s_tu);
          consider(4, s_td);

          if (best_idx != 0) {
            return;
          }

          // Toggle main light. NeoPixel always disables when turning OFF.
          if (id(task_light).current_values.is_on()) {
            // Save the current brightness/CCT before powering down.
            const float b = id(task_light).current_values.get_brightness();
            if (b > 0.0f) {
              id(saved_brightness) = b;
            }

            float ct_mired = id(task_light).current_values.get_color_temperature();
            const float ct_warm_mired = 1000000.0f / 2700.0f;
            const float ct_cool_mired = 1000000.0f / 5000.0f;
            if (ct_mired < ct_cool_mired) ct_mired = ct_cool_mired;
            if (ct_mired > ct_warm_mired) ct_mired = ct_warm_mired;
            id(saved_ct_mired) = ct_mired;
            id(ui_color_temperature).publish_state(1000000.0f / ct_mired);

            id(power_arm_neopixel) = false;
            id(neopixel_enabled) = false;
            auto call = id(task_light).turn_off();
            call.set_transition_length(200);
            call.perform();
            return;
          }

          // Turn ON at the last brightness/CCT (with a short fade to avoid a "flash").
          id(power_arm_neopixel) = true;
          float b = id(saved_brightness);
          if (b < 0.05f) b = 0.05f;
          if (b > 1.0f) b = 1.0f;

          float ct_mired = id(saved_ct_mired);
          const float ct_warm_mired = 1000000.0f / 2700.0f;
          const float ct_cool_mired = 1000000.0f / 5000.0f;
          if (ct_mired < ct_cool_mired) ct_mired = ct_cool_mired;
          if (ct_mired > ct_warm_mired) ct_mired = ct_warm_mired;

          auto call = id(task_light).turn_on();
          call.set_transition_length(200);
          call.set_brightness(b);
          call.set_color_temperature(ct_mired);
          call.perform();
    on_release:
      - lambda: |-
          if (id(touch_debug).state) {
            ESP_LOGI("touch", "touch_power release value=%u threshold=%u",
                     (unsigned) id(touch_power).get_value(),
                     (unsigned) id(touch_power).get_threshold());
          }
          id(power_arm_neopixel) = false;
    on_multi_click:
      - timing:
          - ON for at least 3s
        then:
          - lambda: |-
              if (!id(touch_controls).state) {
                return;
              }
              if (id(touch_calibrating)) {
                return;
              }
              if (id(power_arm_neopixel) && id(task_light).current_values.is_on()) {
                id(neopixel_enabled) = true;
              }
          - script.execute: sync_status_pixel

  - platform: esp32_touch
    id: touch_brightness_up
    pin: ${pin_touch_brightness_up}
    threshold: ${touch_threshold_brightness_up}
