          consider(1, s_bu);
          consider(2, s_bd);
          consider(3, s_tu);
          consider(4, s_td);

          if (best_idx != 3) {
            return;
          }

          id(temp_up_hold).execute();

          // Single tap: step cooler.
          if (!id(task_light).current_values.is_on()) {
            return;
          }
          const float ct_cool_mired = 1000000.0f / 5000.0f;
          float ct_mired = id(task_light).current_values.get_color_temperature();
          ct_mired -= ${touch_tap_ct_step_mired};
          if (ct_mired < ct_cool_mired) ct_mired = ct_cool_mired;
          auto call = id(task_light).turn_on();
          call.set_transition_length(10);
          call.set_color_temperature(ct_mired);
          call.perform();
    on_release:
      - lambda: |-
          if (id(touch_debug).state) {
            ESP_LOGI("touch", "touch_temp_up release value=%u threshold=%u",
                     (unsigned) id(touch_temp_up).get_value(),
                     (unsigned) id(touch_temp_up).get_threshold());
          }
    on_multi_click:
      # Double tap -> MAX COOL (5000K).
      - timing:
          - ON for at most 300ms
          - OFF for at most 300ms
          - ON for at most 300ms
        then:
          - lambda: |-
              if (!id(touch_controls).state) {
                return;
              }
              if (id(touch_calibrating)) {
                return;
              }
              if (!id(task_light).current_values.is_on()) {
                return;
              }
              auto call = id(task_light).turn_on();
              call.set_color_temperature(1000000.0f / 5000.0f);
              call.perform();

  - platform: esp32_touch
    id: touch_temp_dn
    pin: ${pin_touch_temp_dn}
    threshold: ${touch_threshold_temp_dn}
    internal: true
    filters:
      - delayed_on: ${touch_filter_on_delay_buttons}
      - delayed_off: ${touch_filter_off_delay_buttons}
    on_press:
      - lambda: |-
          if (id(touch_debug).state) {
            ESP_LOGI("touch", "touch_temp_dn press value=%u threshold=%u controls=%d calibrating=%d",
                     (unsigned) id(touch_temp_dn).get_value(),
                     (unsigned) id(touch_temp_dn).get_threshold(),
                     id(touch_controls).state ? 1 : 0,
                     id(touch_calibrating) ? 1 : 0);
          }
          if (!id(touch_controls).state) {
            return;
          }
          if (id(touch_calibrating)) {
            return;
          }

          // Cross-talk guard: only act when this pad is the "strongest" touch.
          auto read_delta = [](touch_pad_t pad, uint32_t *out_delta) -> bool {
            uint32_t bench = 0;
            uint32_t value = 0;
            if (touch_pad_read_benchmark(pad, &bench) != ESP_OK || bench == 0) {
              return false;
            }
            if (touch_pad_filter_read_smooth(pad, &value) != ESP_OK || value == 0) {
              if (touch_pad_read_raw_data(pad, &value) != ESP_OK || value == 0) {
                return false;
              }
            }
            *out_delta = (value > bench) ? (value - bench) : 0u;
            return true;
          };

          uint32_t d_power = 0, d_bu = 0, d_bd = 0, d_tu = 0, d_td = 0;
          const bool ok_td = read_delta(id(touch_temp_dn).get_touch_pad(), &d_td);
          if (!ok_td) {
            return;
          }
          (void) read_delta(id(touch_power).get_touch_pad(), &d_power);
          (void) read_delta(id(touch_brightness_up).get_touch_pad(), &d_bu);
          (void) read_delta(id(touch_brightness_dn).get_touch_pad(), &d_bd);
          (void) read_delta(id(touch_temp_up).get_touch_pad(), &d_tu);

          const int32_t s_power = (int32_t) d_power - (int32_t) id(touch_power).get_threshold();
          const int32_t s_bu = (int32_t) d_bu - (int32_t) id(touch_brightness_up).get_threshold();
          const int32_t s_bd = (int32_t) d_bd - (int32_t) id(touch_brightness_dn).get_threshold();
          const int32_t s_tu = (int32_t) d_tu - (int32_t) id(touch_temp_up).get_threshold();
          const int32_t s_td = (int32_t) d_td - (int32_t) id(touch_temp_dn).get_threshold();

          int best_idx = -1;
          int32_t best_s = 0;
          auto consider = [&](int idx, int32_t s) {
            if (s <= 0) return;
            if (best_idx < 0 || s > best_s) {
              best_idx = idx;
              best_s = s;
            }
          };
          consider(0, s_power);
          consider(1, s_bu);
          consider(2, s_bd);
          consider(3, s_tu);
          consider(4, s_td);

          if (best_idx != 4) {
            return;
          }

          id(temp_dn_hold).execute();

          // Single tap: step warmer.
          if (!id(task_light).current_values.is_on()) {
            return;
          }
          const float ct_warm_mired = 1000000.0f / 2700.0f;
          float ct_mired = id(task_light).current_values.get_color_temperature();
          ct_mired += ${touch_tap_ct_step_mired};
          if (ct_mired > ct_warm_mired) ct_mired = ct_warm_mired;
          auto call = id(task_light).turn_on();
          call.set_transition_length(10);
          call.set_color_temperature(ct_mired);
          call.perform();
    on_release:
      - lambda: |-
          if (id(touch_debug).state) {
            ESP_LOGI("touch", "touch_temp_dn release value=%u threshold=%u",
                     (unsigned) id(touch_temp_dn).get_value(),
                     (unsigned) id(touch_temp_dn).get_threshold());
          }
    on_multi_click:
      # Double tap -> MAX WARM (2700K).
      - timing:
          - ON for at most 300ms
          - OFF for at most 300ms
          - ON for at most 300ms
        then:
          - lambda: |-
              if (!id(touch_controls).state) {
                return;
              }
              if (id(touch_calibrating)) {
                return;
              }
              if (!id(task_light).current_values.is_on()) {
                return;
              }
              auto call = id(task_light).turn_on();
              call.set_color_temperature(1000000.0f / 2700.0f);
              call.perform();

